services:
  - type: web
    name: system-siege-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DATABASE_URL
        sync: false # Requires manual entry in the dashboard
      - key: FRONTEND_URL
        sync: false # Requires manual entry in the dashboard
      - key: SECRET_KEY
      - key: REDIS_URL
        fromService:
          type: redis
          name: system-siege-redis
          property: connectionString

  - type: worker
    name: system-siege-celery-worker
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A backend.celery_app worker --loglevel=info
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: REDIS_URL
        fromService:
          type: redis
          name: system-siege-redis
          property: connectionString
      - key: DATABASE_URL
        sync: false

  - type: redis
    name: system-siege-redis
    ipAllowList: []
    plan: free
