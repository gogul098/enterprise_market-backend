services:
  - type: web
    name: system-siege-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DATABASE_URL
        sync: false # Requires manual entry in the dashboard
      - key: FRONTEND_URL
        sync: false # Requires manual entry in the dashboard
      - key: SECRET_KEY
        generateValue: true
